name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyCzahdIXgzDbKMKH3S2OcsCg8S694TB1ZQ
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: iglesiaesyf-dd026.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: iglesiaesyf-dd026
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: iglesiaesyf-dd026.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "9732884998"
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:9732884998:web:ffa524fc6dd2b920b65187
          NEXT_PUBLIC_ADMIN_PIN: "1234"

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Delete stale github-pages artifacts
        run: |
          ids=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts?name=github-pages" \
            | jq -r '.artifacts[] | select(.expired == false) | .id')
          for id in $ids; do
            curl -s -X DELETE -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/$id"
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out
          retention-days: 1

      - id: deployment
        uses: actions/deploy-pages@v4
